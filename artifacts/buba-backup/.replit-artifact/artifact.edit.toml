kind = "web"
  previewPath = "/"
  title = "BUBA Token (Backup)"
  version = "1.0.0"
  id = "artifacts/buba-backup"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 20188

  [services.development]
  run = "pnpm --filter @workspace/buba-backup run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/buba-backup", "run", "build" ]
  publicDir = "artifacts/buba-backup/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "20188"
  BASE_PATH = "/"
  