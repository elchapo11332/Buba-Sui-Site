kind = "web"
  previewPath = "/buba-backup/"
  title = "BUBA Token (Backup)"
  version = "1.0.0"
  id = "artifacts/buba"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/buba-backup/" ]
  localPort = 20188

  [services.development]
  run = "pnpm --filter @workspace/buba run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/buba", "run", "build" ]
  publicDir = "artifacts/buba/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "20188"
  BASE_PATH = "/buba-backup/"
  